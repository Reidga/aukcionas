<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aukcionas</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: #f5f5f5;
        }

        header {
            background: #000;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: orange;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        .hero {
            text-align: center;
            padding: 80px 20px;
            background: linear-gradient(180deg, #050505 0%, #1f1f1f 100%);
            color: #ffffff;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 14px;
            color: #ffffff;
        }

        .hero p {
            margin: 0;
            color: #d7d7d7;
            font-size: 18px;
        }

        .hero button {
            margin-top: 28px;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            background: orange;
            color: #111;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .hero-actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .secondary-btn {
            background: transparent;
            color: orange;
            border: 1px solid orange;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            align-items: stretch;
        }

        .card {
            background: #1c1c1c;
            padding: 15px;
            border-radius: 8px;
            color: #ffffff;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-sizing: border-box;
        }

        .card img {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 8px;
            display: block;
            background: #0d0d0d;
        }

        .card h3 {
            margin: 16px 0 10px;
            color: #ffffff;
            font-size: 24px;
            line-height: 1.2;
            min-height: 58px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price {
            color: orange;
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 14px;
        }

        .auction-deadline,
        .auction-countdown {
            margin: 0 0 10px;
            font-size: 14px;
            line-height: 1.45;
        }

        .auction-deadline {
            color: #d7d7d7;
        }

        .auction-countdown {
            color: #ffd27a;
            font-weight: bold;
        }

        .auction-countdown.auction-ended {
            color: #ff7b7b;
        }

        .bid-btn {
            margin-top: auto;
            padding: 12px;
            width: 100%;
            background: orange;
            color: #111;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            min-height: 46px;
        }

        .owner-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            width: 100%;
        }

        .owner-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid #ff6b6b;
            border-radius: 6px;
            background: transparent;
            color: #ff6b6b;
            cursor: pointer;
            font-weight: bold;
            min-height: 38px;
        }

        .edit-btn {
            border-color: orange;
            color: orange;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            width: 100%;
            max-width: 420px;
            background: #1c1c1c;
            border: 1px solid #343434;
            border-radius: 8px;
            padding: 24px;
            box-sizing: border-box;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }

        .modal-box h3 {
            margin: 0 0 12px;
            font-size: 24px;
            color: #ffffff;
        }

        .modal-box p {
            margin: 0;
            color: #d7d7d7;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            min-height: 42px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .modal-cancel {
            background: transparent;
            color: #ffffff;
            border: 1px solid #595959;
        }

        .modal-delete {
            background: #ff5a5a;
            color: #111;
            border: 1px solid #ff5a5a;
        }

    </style>
</head>

<body>

    <header>
        <div class="logo">🔥 Aukcionas</div>
        <nav>
            <a href="login.html" id="loginLink">Prisijungti</a>
            <a href="#" id="logoutLink" class="hidden" onclick="logout()">Atsijungti</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-actions">
            <button class="secondary-btn" onclick="window.location.href='upload.html'">Įkelti savo automobilį</button>
        </div>
    </section>

    <section class="grid" id="carsGrid"></section>

    <div class="modal-overlay" id="deleteModal">
        <div class="modal-box">
            <h3>Trinti skelbima?</h3>
            <p>Ar tikrai nori panaikinti si skelbima? Po istrynimo jo susigrazinti nepavyks.</p>
            <div class="modal-actions">
                <button class="modal-cancel" onclick="closeDeleteModal()">Atsaukti</button>
                <button class="modal-delete" onclick="confirmDeleteCar()">Istrinti</button>
            </div>
        </div>
    </div>

    <script>
const CAR_IMAGE_DB_NAME = "auctionCarImages";
const CAR_IMAGE_STORE_NAME = "carImages";
let pendingDeleteCarId = "";
let auctionCountdownTimer = null;
const defaultCars = [
    {
        id: "default-bmw-320",
        brand: "BMW",
        model: "320",
        title: "BMW 320",
        year: "2018",
        power: "184",
        fuel: "Dyzelis",
        transmission: "Automatine",
        drive: "Galiniai",
        doors: "4",
        bodyType: "Sedanas",
        mileage: "165000",
        color: "Melyna",
        price: 1500,
        image: "https://images.unsplash.com/photo-1502877338535-766e1452684a",
        images: ["https://images.unsplash.com/photo-1502877338535-766e1452684a"]
    },
    {
        id: "default-audi-a6",
        brand: "Audi",
        model: "A6",
        title: "Audi A6",
        year: "2017",
        power: "190",
        fuel: "Dyzelis",
        transmission: "Automatine",
        drive: "Priekiniai",
        doors: "4",
        bodyType: "Sedanas",
        mileage: "189000",
        color: "Juoda",
        price: 2200,
        image: "https://images.unsplash.com/photo-1493238792000-8113da705763",
        images: ["https://images.unsplash.com/photo-1493238792000-8113da705763"]
    },
    {
        id: "default-mercedes-e200",
        brand: "Mercedes-Benz",
        model: "E200",
        title: "Mercedes E200",
        year: "2019",
        power: "197",
        fuel: "Benzinas",
        transmission: "Automatine",
        drive: "Galiniai",
        doors: "4",
        bodyType: "Sedanas",
        mileage: "98000",
        color: "Geltona",
        price: 3000,
        image: "https://images.unsplash.com/photo-1511919884226-fd3cad34687c",
        images: ["https://images.unsplash.com/photo-1511919884226-fd3cad34687c"]
    }
];

function getCars() {
    let cars = JSON.parse(localStorage.getItem("auctionCars"));

    if (!Array.isArray(cars) || cars.length === 0) {
        localStorage.setItem("auctionCars", JSON.stringify(defaultCars));
        return [...defaultCars];
    }

    return cars;
}

function openImageDb() {
    return new Promise(function(resolve, reject) {
        let request = indexedDB.open(CAR_IMAGE_DB_NAME, 1);

        request.onupgradeneeded = function(event) {
            let db = event.target.result;

            if (!db.objectStoreNames.contains(CAR_IMAGE_STORE_NAME)) {
                db.createObjectStore(CAR_IMAGE_STORE_NAME);
            }
        };

        request.onsuccess = function() {
            resolve(request.result);
        };

        request.onerror = function() {
            reject(request.error);
        };
    });
}

function getCarImagesFromDb(carId) {
    return openImageDb().then(function(db) {
        return new Promise(function(resolve, reject) {
            let transaction = db.transaction(CAR_IMAGE_STORE_NAME, "readonly");
            let store = transaction.objectStore(CAR_IMAGE_STORE_NAME);
            let request = store.get(carId);

            request.onsuccess = function() {
                db.close();
                resolve(Array.isArray(request.result) ? request.result : []);
            };

            request.onerror = function() {
                db.close();
                reject(request.error);
            };
        });
    });
}

function deleteCarImagesFromDb(carId) {
    return openImageDb().then(function(db) {
        return new Promise(function(resolve, reject) {
            let transaction = db.transaction(CAR_IMAGE_STORE_NAME, "readwrite");
            let store = transaction.objectStore(CAR_IMAGE_STORE_NAME);

            store.delete(carId);

            transaction.oncomplete = function() {
                db.close();
                resolve();
            };

            transaction.onerror = function() {
                db.close();
                reject(transaction.error);
            };
        });
    });
}

function getCurrentUserName() {
    if (localStorage.getItem("loggedIn") !== "true") {
        return "";
    }

    return localStorage.getItem("currentUserName") || localStorage.getItem("userName") || "";
}

function claimOldUserCarsForCurrentUser() {
    let currentUserName = getCurrentUserName();

    if (!currentUserName) {
        return;
    }

    let cars = getCars();
    let changed = false;

    for (let i = 0; i < cars.length; i++) {
        if (!cars[i].ownerName && typeof cars[i].id === "string" && cars[i].id.startsWith("user-car-")) {
            cars[i].ownerName = currentUserName;
            changed = true;
        }
    }

    if (changed) {
        localStorage.setItem("auctionCars", JSON.stringify(cars));
    }
}

function formatAuctionEndAt(endAt) {
    if (!endAt) {
        return "Nenurodyta";
    }

    let date = new Date(endAt);

    if (Number.isNaN(date.getTime())) {
        return "Nenurodyta";
    }

    let day = String(date.getDate()).padStart(2, "0");
    let month = String(date.getMonth() + 1).padStart(2, "0");
    let year = date.getFullYear();
    let hours = String(date.getHours()).padStart(2, "0");
    let minutes = String(date.getMinutes()).padStart(2, "0");

    return day + "." + month + "." + year + " " + hours + ":" + minutes;
}

function getAuctionCountdownText(endAt) {
    if (!endAt) {
        return "Aukciono pabaiga nenurodyta";
    }

    let endDate = new Date(endAt);

    if (Number.isNaN(endDate.getTime())) {
        return "Aukciono pabaiga nenurodyta";
    }

    let diff = endDate.getTime() - Date.now();

    if (diff <= 0) {
        return "Aukcionas baigesi";
    }

    let totalSeconds = Math.floor(diff / 1000);
    let days = Math.floor(totalSeconds / 86400);
    let hours = Math.floor((totalSeconds % 86400) / 3600);
    let minutes = Math.floor((totalSeconds % 3600) / 60);
    let seconds = totalSeconds % 60;

    return "Liko: " + days + " d. " + String(hours).padStart(2, "0") + ":" + String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
}

function isAuctionEnded(endAt) {
    if (!endAt) {
        return false;
    }

    let endDate = new Date(endAt);

    if (Number.isNaN(endDate.getTime())) {
        return false;
    }

    return endDate.getTime() <= Date.now();
}

function removeExpiredCarsFromStorage() {
    let cars = getCars();
    let expiredCarIds = [];
    let activeCars = [];

    for (let i = 0; i < cars.length; i++) {
        if (isAuctionEnded(cars[i].auctionEndAt)) {
            expiredCarIds.push(cars[i].id);
        } else {
            activeCars.push(cars[i]);
        }
    }

    if (expiredCarIds.length === 0) {
        return false;
    }

    localStorage.setItem("auctionCars", JSON.stringify(activeCars));

    if (expiredCarIds.includes(localStorage.getItem("selectedCarId") || "")) {
        localStorage.removeItem("selectedCarId");
    }

    for (let i = 0; i < expiredCarIds.length; i++) {
        deleteCarImagesFromDb(expiredCarIds[i]).catch(function(error) {
            console.error(error);
        });
    }

    return true;
}

function updateAuctionCountdowns() {
    let countdownElements = document.querySelectorAll("[data-auction-end]");

    for (let i = 0; i < countdownElements.length; i++) {
        let countdownElement = countdownElements[i];
        let endAt = countdownElement.getAttribute("data-auction-end");
        let ended = isAuctionEnded(endAt);

        if (ended) {
            renderCars();
            return;
        }

        countdownElement.textContent = getAuctionCountdownText(endAt);
        countdownElement.classList.toggle("auction-ended", ended);
    }
}

function startAuctionCountdowns() {
    if (auctionCountdownTimer) {
        clearInterval(auctionCountdownTimer);
    }

    updateAuctionCountdowns();
    auctionCountdownTimer = setInterval(updateAuctionCountdowns, 1000);
}

function renderCars() {
    let carsGrid = document.getElementById("carsGrid");

    removeExpiredCarsFromStorage();
    claimOldUserCarsForCurrentUser();
    let cars = getCars();
    let currentUserName = getCurrentUserName();

    carsGrid.innerHTML = "";

    for (let i = 0; i < cars.length; i++) {
        let car = cars[i];
        let previewImage = car.image;

        let card = document.createElement("div");

        card.className = "card";
        card.innerHTML =
            '<img src="' + previewImage + '" alt="' + car.title + '">' +
            "<h3>" + car.title + "</h3>" +
            '<p class="price">' + car.price + '€</p>' +
            '<p class="auction-deadline">Pabaiga: ' + formatAuctionEndAt(car.auctionEndAt) + '</p>' +
            '<p class="auction-countdown" data-auction-end="' + (car.auctionEndAt || "") + '"></p>' +
            '<button class="bid-btn" onclick="openCar(\'' + car.id + '\')">Statyti kaina</button>';

        if (car.ownerName && car.ownerName === currentUserName) {
            card.innerHTML +=
                '<div class="owner-actions">' +
                '<button class="owner-btn edit-btn" onclick="editCar(\'' + car.id + '\')">Redaguoti</button>' +
                '<button class="owner-btn" onclick="deleteCar(\'' + car.id + '\')">Istrinti</button>' +
                '</div>';
        }

        carsGrid.appendChild(card);

        if ((!previewImage || previewImage === "") && car.imageCount > 0) {
            getCarImagesFromDb(car.id).then(function(images) {
                if (images.length > 0) {
                    let imageElement = card.querySelector("img");
                    imageElement.src = images[0];
                }
            }).catch(function(error) {
                console.error(error);
            });
        }
    }

    startAuctionCountdowns();
}

function editCar(carId) {
    let cars = getCars();
    let currentUserName = getCurrentUserName();
    let carToEdit = cars.find(function(car) {
        return car.id === carId;
    });

    if (!carToEdit || carToEdit.ownerName !== currentUserName) {
        alert("Tu negali redaguoti sito automobilio.");
        return;
    }

    localStorage.setItem("editCarId", carId);
    window.location.href = "upload.html";
}

function deleteCar(carId) {
    let cars = getCars();
    let currentUserName = getCurrentUserName();
    let carToDelete = cars.find(function(car) {
        return car.id === carId;
    });

    if (!carToDelete || carToDelete.ownerName !== currentUserName) {
        alert("Tu negali istrinti sito automobilio.");
        return;
    }

    pendingDeleteCarId = carId;
    document.getElementById("deleteModal").classList.add("active");
}

function closeDeleteModal() {
    pendingDeleteCarId = "";
    document.getElementById("deleteModal").classList.remove("active");
}

function confirmDeleteCar() {
    if (!pendingDeleteCarId) {
        closeDeleteModal();
        return;
    }

    let carId = pendingDeleteCarId;
    let cars = getCars();

    let filteredCars = cars.filter(function(car) {
        return car.id !== carId;
    });

    localStorage.setItem("auctionCars", JSON.stringify(filteredCars));
    deleteCarImagesFromDb(carId).catch(function(error) {
        console.error(error);
    });
    closeDeleteModal();
    renderCars();
}

function openCar(carId) {
    localStorage.setItem("selectedCarId", carId);

    window.location.href = "car.html";
}

function logout() {
    localStorage.setItem("loggedIn", "false");
    localStorage.removeItem("currentUserName");
    alert("Atsijungta");
    updateAuthLinks();
    renderCars();
}

function updateAuthLinks() {
    let loggedIn = localStorage.getItem("loggedIn");
    let loginLink = document.getElementById("loginLink");
    let logoutLink = document.getElementById("logoutLink");

    if (loggedIn === "true") {
        loginLink.classList.add("hidden");
        logoutLink.classList.remove("hidden");
    } else {
        loginLink.classList.remove("hidden");
        logoutLink.classList.add("hidden");
    }
}

updateAuthLinks();
renderCars();
    </script>

</body>
</html>

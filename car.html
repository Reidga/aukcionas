<!DOCTYPE html>
<html>
<head>
    <title>Automobilis</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        img {
            width: 400px;
            border-radius: 10px;
        }

        .price {
            font-size: 30px;
            color: orange;
        }

        input {
            padding: 10px;
            font-size: 18px;
            width: 100px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background: orange;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1 id="carName"></h1>

<img id="carImage">

<p class="price">Kaina: <span id="price"></span> €</p>

<p>Kiek nori pakelti:</p>
<input type="number" id="bidInput" value="100">

<br><br>

<button onclick="bid()">Statyti kainą</button>

<script>
    let name = localStorage.getItem("carName");
    let price = parseInt(localStorage.getItem("carPrice"));
    let image = localStorage.getItem("carImage");

    document.getElementById("carName").innerText = name;
    document.getElementById("price").innerText = price;
    document.getElementById("carImage").src = image;

    function bid() {
        let loggedIn = localStorage.getItem("loggedIn");

        if(loggedIn !== "true") {
            alert("Pirmiausia prisijunk!");
            window.location.href = "login.html";
            return;
        }

        let bidAmount = parseInt(document.getElementById("bidInput").value);
        price += bidAmount;

        document.getElementById("price").innerText = price;

        localStorage.setItem("carPrice", price);
    }
</script>

</body>
</html>
